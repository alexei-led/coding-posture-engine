name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install -U pytest
      - name: Run tests
        run: python -m pytest -q
      - name: Smoke CLI
        run: |
          PYTHONPATH=. python -m coding_posture_engine.cli select fix failing pytest regression
          PYTHONPATH=. python -m coding_posture_engine.cli --agent claude render --include-task fix failing pytest regression
